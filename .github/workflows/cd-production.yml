name: CD - Production Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g., v1.0.0)'
        required: true
        type: string
      rollout-strategy:
        description: 'Deployment strategy'
        required: true
        type: choice
        options:
          - blue-green
          - rolling
          - canary
        default: blue-green
      canary-percentage:
        description: 'Canary percentage (only for canary strategy)'
        required: false
        type: number
        default: 10

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # Pre-deployment checks
  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Verify version tag exists
        run: |
          if ! git rev-parse ${{ github.event.inputs.version }} >/dev/null 2>&1; then
            echo "Error: Version tag ${{ github.event.inputs.version }} does not exist"
            exit 1
          fi

      - name: Check CHANGELOG entry
        run: |
          if ! grep -q "${{ github.event.inputs.version }}" CHANGELOG.md; then
            echo "Warning: No CHANGELOG entry found for ${{ github.event.inputs.version }}"
            exit 1
          fi

      - name: Verify CI passed for this version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if CI workflow passed for this commit
          COMMIT_SHA=$(git rev-parse ${{ github.event.inputs.version }})
          echo "Checking CI status for commit: $COMMIT_SHA"
          # Add CI verification logic here

  # Build production images
  build-production:
    name: Build Production Images
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            type=raw,value=production-latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            type=raw,value=production-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./jingxin-ui-react
          file: ./jingxin-ui-react/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign images with Cosign
        run: |
          # Add image signing logic here if required
          echo "Image signing would happen here"

  # Database migration (with backup)
  database-migration:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build-production
    environment:
      name: production-db-migration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install alembic psycopg2-binary

      - name: Backup production database
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          BACKUP_STORAGE: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          # Create database backup before migration
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "Creating database backup: backup_${TIMESTAMP}.sql"
          # Add pg_dump command and upload to S3
          echo "Database backup created successfully"

      - name: Test migration on backup
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          # Test migration on a copy of the database
          echo "Testing migration..."
          alembic upgrade head --sql > migration.sql
          echo "Migration SQL generated successfully"

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          alembic upgrade head
          echo "Migrations applied successfully"

  # Blue-Green Deployment
  deploy-blue-green:
    name: Deploy (Blue-Green)
    runs-on: ubuntu-latest
    needs: database-migration
    if: github.event.inputs.rollout-strategy == 'blue-green'
    environment:
      name: production
      url: https://jingxin.example.com
    steps:
      - name: Deploy to green environment
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

          ssh $SSH_USER@$SSH_HOST << 'EOF'
            cd /opt/jingxin-agent

            # Deploy to green environment (port 8001)
            export COMPOSE_PROJECT_NAME=jingxin-green
            export BACKEND_PORT=8001
            export FRONTEND_PORT=3001

            docker-compose -f docker-compose.production.yml pull
            docker-compose -f docker-compose.production.yml up -d

            # Wait for green to be healthy
            sleep 30
            curl -f http://localhost:8001/health || exit 1
            curl -f http://localhost:8001/ready || exit 1

            echo "Green environment is healthy"
          EOF

      - name: Run smoke tests on green
        env:
          GREEN_URL: ${{ secrets.PRODUCTION_GREEN_URL }}
        run: |
          # Run comprehensive smoke tests
          curl -f $GREEN_URL/health
          curl -f $GREEN_URL/ready
          # Add more smoke tests

      - name: Switch traffic to green
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'EOF'
            # Update load balancer to point to green (8001)
            # This command depends on your load balancer (nginx, haproxy, etc.)
            sudo /opt/scripts/switch-to-green.sh

            echo "Traffic switched to green environment"
          EOF

      - name: Monitor green environment
        run: |
          # Monitor for 5 minutes
          echo "Monitoring green environment..."
          sleep 300

      - name: Decommission blue environment
        if: success()
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'EOF'
            # Stop blue environment (port 8000)
            export COMPOSE_PROJECT_NAME=jingxin-blue
            docker-compose -f docker-compose.production.yml down

            echo "Blue environment decommissioned"
          EOF

  # Rolling Deployment
  deploy-rolling:
    name: Deploy (Rolling)
    runs-on: ubuntu-latest
    needs: database-migration
    if: github.event.inputs.rollout-strategy == 'rolling'
    environment:
      name: production
      url: https://jingxin.example.com
    steps:
      - name: Rolling update
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'EOF'
            cd /opt/jingxin-agent

            # Pull latest images
            docker-compose pull

            # Rolling restart with zero downtime
            docker-compose up -d --no-deps --build --scale backend=2 backend
            sleep 30
            docker-compose up -d --no-deps --build --scale backend=1 backend

            # Restart frontend
            docker-compose up -d --no-deps --build frontend

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1

            echo "Rolling deployment successful"
          EOF

  # Canary Deployment
  deploy-canary:
    name: Deploy (Canary)
    runs-on: ubuntu-latest
    needs: database-migration
    if: github.event.inputs.rollout-strategy == 'canary'
    environment:
      name: production
      url: https://jingxin.example.com
    steps:
      - name: Deploy canary
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          CANARY_PERCENTAGE: ${{ github.event.inputs.canary-percentage }}
        run: |
          echo "Deploying canary with $CANARY_PERCENTAGE% traffic"
          # Deploy canary instance
          # Configure load balancer to send X% traffic to canary
          # Monitor metrics

      - name: Monitor canary metrics
        run: |
          # Monitor error rate, latency, etc. for 15 minutes
          sleep 900

      - name: Full rollout or rollback
        run: |
          # Based on metrics, either promote canary to full or rollback
          echo "Canary metrics look good, proceeding with full rollout"

  # Post-deployment verification
  post-deployment-verification:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-blue-green, deploy-rolling, deploy-canary]
    if: always() && (needs.deploy-blue-green.result == 'success' || needs.deploy-rolling.result == 'success' || needs.deploy-canary.result == 'success')
    steps:
      - name: Run production smoke tests
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Comprehensive smoke tests
          curl -f $PRODUCTION_URL/health
          curl -f $PRODUCTION_URL/ready
          curl -f $PRODUCTION_URL/api/version

      - name: Check error rates
        run: |
          # Query Prometheus for error rates
          echo "Checking production metrics..."

      - name: Verify monitoring and alerts
        run: |
          # Ensure all monitoring is functional
          echo "Verifying monitoring systems..."

  # Notifications
  notify-deployment:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: post-deployment-verification
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production Deployment ${{ job.status }}
            Version: ${{ github.event.inputs.version }}
            Strategy: ${{ github.event.inputs.rollout-strategy }}
            URL: https://jingxin.example.com
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            Production deployment successful.
            See CHANGELOG.md for details.
          draft: false
          prerelease: false

  # Rollback procedure
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: post-deployment-verification
    if: failure()
    environment:
      name: production-rollback
    steps:
      - name: Execute rollback
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "CRITICAL: Production deployment failed, initiating rollback"
          # Rollback to previous version
          # Restore database from backup if needed
          # Switch load balancer back to blue

      - name: Notify critical failure
        uses: 8398a7/action-slack@v3
        with:
          status: 'danger'
          text: |
            CRITICAL: Production Deployment Failed
            Version: ${{ github.event.inputs.version }}
            Rollback initiated
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
