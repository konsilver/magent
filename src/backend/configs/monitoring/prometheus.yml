# Prometheus configuration file

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'jingxin-agent'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Jingxin-Agent backend
  - job_name: 'jingxin-agent-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend'

  # Scrape Postgres Exporter (optional, if configured)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Scrape Node Exporter (optional, if configured)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
