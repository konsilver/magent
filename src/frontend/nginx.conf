user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Suppress healthcheck and high-frequency polling noise from access logs
    map $http_user_agent $loggable_ua {
        default          1;
        "~*Wget"         0;
        "~*curl"         0;
    }
    map $request_uri $loggable_uri {
        default                                      1;
        "~^/api/v1/automations/notifications"        0;
        "~^/health"                                  0;
    }
    map "${loggable_ua}${loggable_uri}" $loggable {
        "~0"   0;
        default 1;
    }

    access_log /var/log/nginx/access.log main if=$loggable;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Server block is rendered from template at container startup
    include /etc/nginx/conf.d/*.conf;
}
