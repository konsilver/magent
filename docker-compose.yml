services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jingxin-postgres
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: jingxin
      POSTGRES_USER: jingxin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jingxin_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jingxin_user -d jingxin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jingxin-network

  # Redis (session storage)
  redis:
    image: redis:7-alpine
    container_name: jingxin-redis
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jingxin-network
    restart: unless-stopped

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: jingxin-backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # Database
      DATABASE_URL: postgresql://jingxin_user:${DB_PASSWORD:-jingxin_dev_password}@postgres:5432/jingxin

      # Environment
      ENV: ${ENV:-dev}
      PORT: ${BACKEND_PORT:-3001}

      # Authentication
      AUTH_MODE: ${AUTH_MODE:-mock}
      AUTH_API_URL: ${AUTH_API_URL:-}
      AUTH_API_TIMEOUT: ${AUTH_API_TIMEOUT:-5}
      AUTH_RETRY_COUNT: ${AUTH_RETRY_COUNT:-2}
      AUTH_MOCK_USER_ID: ${AUTH_MOCK_USER_ID:-dev_user_001}
      AUTH_MOCK_USERNAME: ${AUTH_MOCK_USERNAME:-Developer}

      # Redis / Session
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_STORE: ${SESSION_STORE:-redis}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-jx_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_HTTPONLY: ${SESSION_COOKIE_HTTPONLY:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}

      # SSO
      SSO_LOGIN_MODE: ${SSO_LOGIN_MODE:-mock}
      SSO_EXCHANGE_MODE: ${SSO_EXCHANGE_MODE:-mock}
      SSO_MOCK_ENABLED: ${SSO_MOCK_ENABLED:-false}
      SSO_TICKET_EXCHANGE_URL: ${SSO_TICKET_EXCHANGE_URL:-}
      SSO_LOGIN_URL: ${SSO_LOGIN_URL:-}
      SSO_TIMEOUT_SECONDS: ${SSO_TIMEOUT_SECONDS:-5}
      MOCK_SSO_APP_BASE: ${MOCK_SSO_APP_BASE-}

      # Admin panel
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      CONFIG_TOKEN: ${CONFIG_TOKEN:-}

      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: /app/storage
      CATALOG_PATH: /app/storage/catalog.json
      # S3 Storage (STORAGE_TYPE=s3)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      # Aliyun OSS Storage (STORAGE_TYPE=oss)
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_KEY_PREFIX: ${OSS_KEY_PREFIX:-}
      OSS_PRESIGNED_URL_EXPIRY: ${OSS_PRESIGNED_URL_EXPIRY:-900}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_TO_FILE: ${LOG_TO_FILE:-false}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/backend.log}
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-10485760}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-5}

      # OpenTelemetry
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_JAEGER_ENDPOINT: ${OTEL_EXPORTER_JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      OTEL_SERVICE_NAME: jingxin-agent

      # Model API
      MODEL_URL: ${MODEL_URL:-}
      API_KEY: ${API_KEY:-}
      BASE_MODEL_NAME: ${BASE_MODEL_NAME:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-}
      SUMMARIZE_MODEL_NAME: ${SUMMARIZE_MODEL_NAME:-}
      ENABLE_SUMMARY: ${ENABLE_SUMMARY:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}

      # MCP Tool Backends
      QUERY_DATABASE_URL: ${QUERY_DATABASE_URL:-}
      KNOWLEDGE_BASE: ${KNOWLEDGE_BASE:-}
      DIFY_URL: ${DIFY_URL:-}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_ALLOWED_DATASET_IDS: ${DIFY_ALLOWED_DATASET_IDS:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INDUSTRY_URL: ${INDUSTRY_URL:-}
      INDUSTRY_AUTH_TOKEN: ${INDUSTRY_AUTH_TOKEN:-}

      # mem0 Memory System
      MEM0_ENABLED: ${MEM0_ENABLED:-false}
      MEM0_GRAPH_ENABLED: ${MEM0_GRAPH_ENABLED:-false}
      MEMORY_MODEL_URL: ${MEMORY_MODEL_URL:-}
      MEMORY_API_KEY: ${MEMORY_API_KEY:-}
      MEMORY_MODEL_NAME: ${MEMORY_MODEL_NAME:-}
      MEM0_EMBED_URL: ${MEM0_EMBED_URL:-}
      MEM0_EMBED_API_KEY: ${MEM0_EMBED_API_KEY:-}
      MEM0_EMBED_MODEL: ${MEM0_EMBED_MODEL:-qwen3_embedding_8b}
      MEM0_EMBED_DIMS: ${MEM0_EMBED_DIMS:-4096}
      MILVUS_URL: ${MILVUS_URL:-http://milvus:19530}
      NEO4J_URL: ${NEO4J_URL:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-jingxin_neo4j_2026}

      # Skill Script Runner
      SKILL_SCRIPT_ENABLED: ${SKILL_SCRIPT_ENABLED:-false}
      SKILL_SCRIPT_RUNNER_URL: ${SKILL_SCRIPT_RUNNER_URL:-http://jingxin-script-runner:8900}
      SKILL_SCRIPT_TIMEOUT: ${SKILL_SCRIPT_TIMEOUT:-30}
      SKILL_SCRIPT_MAX_TIMEOUT: ${SKILL_SCRIPT_MAX_TIMEOUT:-120}

      # File Parser Service
      FILE_PARSER_API_URL: ${FILE_PARSER_API_URL:-}
      FILE_PARSER_TIMEOUT: ${FILE_PARSER_TIMEOUT:-60}
      FILE_PARSER_LANG_LIST: ${FILE_PARSER_LANG_LIST:-ch}
      FILE_PARSER_BACKEND: ${FILE_PARSER_BACKEND:-pipeline}
      FILE_PARSER_PARSE_METHOD: ${FILE_PARSER_PARSE_METHOD:-auto}
      FILE_PARSER_FORMULA_ENABLE: ${FILE_PARSER_FORMULA_ENABLE:-true}
      FILE_PARSER_TABLE_ENABLE: ${FILE_PARSER_TABLE_ENABLE:-true}

    volumes:
      - ./src/backend:/app/src/backend
      - ./alembic.ini:/app/alembic.ini:ro
      - ./app.py:/app/app.py:ro
      - storage_data:/app/storage
      - manual_data:/app/storage/manual
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jingxin-network
    restart: unless-stopped

  # Script Runner Sidecar (isolated code execution)
  script-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: script-runner
    container_name: jingxin-script-runner
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SCRIPT_MAX_TIMEOUT: ${SKILL_SCRIPT_MAX_TIMEOUT:-120}
      SCRIPT_DEFAULT_TIMEOUT: ${SKILL_SCRIPT_TIMEOUT:-30}
      SCRIPT_MAX_MEMORY_MB: ${SKILL_SCRIPT_MAX_MEMORY:-256}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      NODE_PATH: /usr/lib/node_modules
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:size=256m,uid=1001,gid=1001
      - /workspace:size=256m,uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - jingxin-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        # Build-time: baked into JS bundle for browser-side API calls
        # Leave empty (or unset in .env) to use nginx /api/ proxy (recommended for Docker)
        # Set to http://host:port for direct backend access (bypasses nginx)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        SSO_LOGIN_URL: ${SSO_LOGIN_URL:-}
    container_name: jingxin-frontend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # Runtime: used by nginx to proxy /api/ to the backend container
      BACKEND_PORT: ${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    volumes:
      - manual_data:/usr/share/nginx/html/docs/manual
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jingxin-network
    restart: unless-stopped

  # ── mem0 Infrastructure ──────────────────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: jingxin-etcd
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jingxin-network
    restart: unless-stopped
    profiles:
      - mem0

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: jingxin-minio
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jingxin-network
    restart: unless-stopped
    profiles:
      - mem0

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: jingxin-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
      - ./src/backend/configs/milvus.yaml:/milvus/configs/user.yaml:ro
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jingxin-network
    restart: unless-stopped
    profiles:
      - mem0

  neo4j:
    image: neo4j:5.15-community
    container_name: jingxin-neo4j
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-jingxin_neo4j_2026}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-jingxin_neo4j_2026}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - jingxin-network
    restart: unless-stopped
    profiles:
      - mem0

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: jingxin-prometheus
    environment:
      TZ: ${TZ_PROMETHEUS:-CST-8}
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
      - ./src/backend/configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./src/backend/configs/alerting/prometheus_rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - jingxin-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: jingxin-grafana
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./src/backend/configs/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./src/backend/configs/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3003:3000"  # Changed from 3001 to 3003
    depends_on:
      - prometheus
    networks:
      - jingxin-network
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jingxin-jaeger
    environment:
      TZ: ${TZ_JAEGER:-CST-8}
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # Jaeger UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - jingxin-network
    restart: unless-stopped

  # AlertManager (optional, for production)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: jingxin-alertmanager
    environment:
      TZ: ${TZ_ALERTMANAGER:-CST-8}
    volumes:
      - ./src/backend/configs/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - jingxin-network
    restart: unless-stopped
    profiles:
      - production

networks:
  jingxin-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  manual_data:
